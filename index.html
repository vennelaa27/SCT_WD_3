<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoX Tic Tac Toe</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Navbar -->

    <nav>

        <div class="logo">

            <img src="images/logo.png" alt="logo">

            <h2>ChronoX</h2>

        </div>

        <button id="themeBtn">

            <i class="fa-solid fa-moon"></i>

        </button>

    </nav>


    <!-- Hero -->

    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">

            <h1>Tic Tac Toe Pro</h1>

            <p>Play against your friend or challenge the Computer AI.</p>

        </div>

    </section>


    <!-- Main Container -->

    <section class="container">

        <!-- Game Mode -->

        <div class="mode-select">

            <button id="playerMode" class="active">

                <i class="fa-solid fa-user-group"></i>

                Player vs Player

            </button>

            <button id="computerMode">

                <i class="fa-solid fa-robot"></i>

                Player vs Computer

            </button>

        </div>

        <!-- Difficulty -->

        <div class="difficulty">

            <label>Difficulty :</label>

            <select id="difficulty">

                <option value="easy">Easy</option>

                <option value="hard">Hard</option>

            </select>

        </div>

        <!-- Status -->

        <h2 id="status">Player X Turn</h2>

        <!-- Game Board -->

        <div class="board" id="board">

            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>

            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>

        </div>

        <!-- Controls -->

        <div class="controls">

            <button id="restartBtn">

                <i class="fa-solid fa-rotate-right"></i>

                Restart

            </button>

            <button id="newGameBtn">

                <i class="fa-solid fa-plus"></i>

                New Game

            </button>

        </div>

        <!-- Score -->

        <div class="scoreboard">

            <div class="score-card">

                <h3>X Wins</h3>

                <p id="xScore">0</p>

            </div>

            <div class="score-card">

                <h3>Draws</h3>

                <p id="drawScore">0</p>

            </div>

            <div class="score-card">

                <h3>O Wins</h3>

                <p id="oScore">0</p>

            </div>

        </div>

    </section>

    <footer>

        <p>

            © 2026 ChronoX Tic Tac Toe | SkillCraft Internship Task 3

        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
